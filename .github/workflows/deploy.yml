name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-frontend:
    name: Build Vite frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci --prefix web --legacy-peer-deps

      - name: Run Vitest tests
        run: npm run test --prefix web -- --run

      - name: Build frontend
        run: npm run build --prefix web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    needs: [build-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add EC2 host to known_hosts
        run: ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload frontend dist to EC2 (atomic replace)
        run: |
          rsync -az --delete web/dist/ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/ticker-tide/web/dist_new/"
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'rm -rf ~/ticker-tide/web/dist_old && mv ~/ticker-tide/web/dist ~/ticker-tide/web/dist_old 2>/dev/null || true && mv ~/ticker-tide/web/dist_new ~/ticker-tide/web/dist'

      - name: Run deploy.sh on EC2
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'cd /home/ec2-user/ticker-tide && ./deploy.sh'

      - name: Restart Telegram bot
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'sudo systemctl restart ticker-tide-bot && sudo systemctl is-active --quiet ticker-tide-bot && echo "Bot is running" || (echo "Bot failed to start" && exit 1)'

      - name: Restart Web service
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'sudo systemctl restart ticker-tide-web && sudo systemctl is-active --quiet ticker-tide-web && echo "Web is running" || (echo "Web failed to start" && exit 1)'
